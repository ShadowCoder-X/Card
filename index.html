<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="left-card">
        <img
          src="images/image-product-desktop.jpg"
          alt="Perfume"
          class="bg-img"
        />
      </div>

      <div class="right-card">
        <h1>PERFUME</h1>

        <h2>
          Gabrielle <br />
          Essence Eau <br />
          De Parfum
        </h2>

        <p>
          A floral, solar and voluptous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>

        <footer>
          <h2 class="price">$149.99</h2>

          <p><s>$169.99</s></p>
        </footer>

        <button>
          <img src="images/icon-cart.svg" alt="Cart" class="btn-icon" />

          <h3>Add to Cart</h3>
        </button>
      </div>
    </main>
  </body>
</html>
